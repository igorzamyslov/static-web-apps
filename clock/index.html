<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clock</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font: 16px/1.6 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0;
      background: Canvas;
      color: CanvasText;
      display: grid;
      min-height: 100vh;
      place-items: center;
      text-align: center;
    }
    #time { font-size: clamp(3rem, 15vw, 8rem); font-variant-numeric: tabular-nums; margin: 0; }
    .meta { opacity: 0.6; font-size: 0.9rem; }
    a { color: LinkText; }
  </style>
</head>
<body>
  <main>
    <h1 id="time">--:--:--</h1>
    <p class="meta">Built at <code>2026-07-14T19:16:50.509Z</code></p>
    <p><a href="../">&larr; All apps</a></p>
  </main>
  <script src="./clock.js"></script>
</body>
</html>
