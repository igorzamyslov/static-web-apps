<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Static web apps</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 16px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: Canvas;
      color: CanvasText;
    }
    main { max-width: 900px; margin: 0 auto; padding: 3rem 1.25rem; }
    h1 { margin: 0 0 0.25rem; font-size: 2rem; }
    .subtitle { margin: 0 0 2rem; opacity: 0.7; }
    .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
    .card {
      display: block;
      padding: 1.25rem;
      border: 1px solid color-mix(in srgb, CanvasText 15%, transparent);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.15s;
    }
    .card:hover { border-color: color-mix(in srgb, CanvasText 40%, transparent); transform: translateY(-2px); }
    .card h2 { margin: 0 0 0.35rem; font-size: 1.15rem; }
    .card p { margin: 0; opacity: 0.7; font-size: 0.95rem; }
  </style>
</head>
<body>
  <main>
    <h1>Static web apps</h1>
    <p class="subtitle">2 apps published from this repo.</p>
    <div class="grid">
      <a class="card" href="./clock/">
        <h2>Clock</h2>
        <p>Built app — demonstrates the npm build pipeline (publishes dist/).</p>
      </a>
      <a class="card" href="./hello/">
        <h2>Hello</h2>
        <p>A plain static page — no build step, folder published as-is.</p>
      </a>
    </div>
  </main>
</body>
</html>
